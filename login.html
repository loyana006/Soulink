<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Soulink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light navbar-custom container">
        <a class="navbar-brand soulink-brand" href="index.html">
            <span class="soul">SOU</span><span class="link">LINK</span>
        </a>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link nav-link-custom" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link nav-link-custom" href="#features">Features</a></li>
                <li class="nav-item"><a class="nav-link nav-link-custom" href="support.html">Support</a></li>
                <li class="nav-item"><a class="nav-link nav-link-custom" href="login.html">Login</a></li>
                <li class="nav-item"><a class="btn btn-primary-custom ms-lg-3" href="signup.html">Sign up</a></li>
            </ul>
        </div>
    </nav>

    <section class="container auth-wrapper">
        <div class="auth-card">
            <h2>Welcome Back!</h2>
            <form action="dashboard.html" method="GET"> 
                <div class="mb-3">
                    <label for="loginEmail" class="form-label">Email/Username</label>
                    <input type="text" class="form-control form-control-custom" id="loginEmail" name="identifier" required>
                </div>
                <div class="mb-4">
                    <label for="loginPassword" class="form-label">Password</label>
                    <input type="password" class="form-control form-control-custom" id="loginPassword" name="password" required>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary-custom btn-lg">Login</button>
                </div>
                
                <p class="auth-footer-text text-center">
                    <a href="#" style="color: var(--color-teal);">Forgot Password?</a>
                </p>
                
                <p class="auth-footer-text text-center">
                    Don't have an account? <a href="signup.html" style="color: var(--color-pink); font-weight: 600;">Sign Up</a>
                </p>
            </form>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
